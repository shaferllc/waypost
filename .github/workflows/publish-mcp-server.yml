# Publish @shaferllc/mcp-server to npm.
#
# Setup (once):
#   1. npmjs.com → Access Tokens → Granular (or classic) token with publish.
#   2. Repo → Settings → Secrets → NPM_TOKEN
#
# Release:
#   1. Bump version in mcp/waypost-server/package.json (e.g. npm version patch --prefix mcp/waypost-server)
#   2. Commit and push.
#   3. Tag: git tag mcp-server-v$(node -p "require('./mcp/waypost-server/package.json').version") && git push origin mcp-server-v…
#   4. This workflow runs on that tag and checks tag ↔ package.json match, then npm publish.
#
# Or: Actions → "Publish @shaferllc/mcp-server" → Run workflow (publishes current package.json on the branch).

name: Publish @shaferllc/mcp-server

on:
  workflow_dispatch:
  push:
    tags:
      - 'mcp-server-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mcp/waypost-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: mcp/waypost-server
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/mcp-server-v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag version $TAG_VER does not match package.json version $PKG_VER"
            exit 1
          fi

      - run: npm ci

      - run: npm run build

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
